<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios JavaScript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding: 20px; }
        .card { margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <h1 class="text-center mb-4">Laboratório de Funções JS</h1>

    <div class="row">
        <div class="col-md-6">
            <div class="card p-3">
                <h5>1 & 2. Operações com Números</h5>
                <input type="number" id="n1" class="form-control mb-2" placeholder="Número 1">
                <input type="number" id="n2" class="form-control mb-2" placeholder="Número 2">
                <input type="number" id="n3" class="form-control mb-2" placeholder="Número 3">
                <button onclick="testarMaior()" class="btn btn-primary mb-1">Qual o Maior?</button>
                <button onclick="testarOrdem()" class="btn btn-secondary">Ordem Crescente</button>
                <div id="res1" class="mt-2 fw-bold"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>3. Verificador de Palíndromo</h5>
                <input type="text" id="inputPalindromo" class="form-control mb-2" placeholder="Digite uma frase ou palavra">
                <button onclick="testarPalindromo()" class="btn btn-success">Verificar</button>
                <div id="res3" class="mt-2 fw-bold"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>4. Verificador de Subconjunto</h5>
                <input type="text" id="palavra1" class="form-control mb-2" placeholder="Palavra completa (ex: Programação)">
                <input type="text" id="palavra2" class="form-control mb-2" placeholder="Subconjunto (ex: grama)">
                <button onclick="testarSubconjunto()" class="btn btn-info text-white">Verificar Contenção</button>
                <div id="res4" class="mt-2 fw-bold"></div>
            </div>
        </div>

        <div class="col-md-6">
            <div class="card p-3">
                <h5>5. Dia da Semana</h5>
                <input type="date" id="inputData" class="form-control mb-2">
                <button onclick="testarData()" class="btn btn-warning">Descobrir Dia</button>
                <div id="res5" class="mt-2 fw-bold"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
