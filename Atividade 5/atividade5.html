<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Pesquisa de Filme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: white;
    }
    .card {
      border-radius: 20px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }
    .btn-custom {
      background: #ff7e5f;
      border: none;
    }
    .btn-custom:hover {
      background: #feb47b;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="card p-4 shadow-lg">
    <h2 class="text-center mb-4">🎬 Pesquisa de Opinião</h2>

    <div class="row g-3">
      <div class="col-md-4">
        <input type="number" id="idade" class="form-control" placeholder="Idade">
      </div>

      <div class="col-md-4">
        <select id="sexo" class="form-select">
          <option value="">Sexo</option>
          <option value="M">Masculino</option>
          <option value="F">Feminino</option>
          <option value="O">Outros</option>
        </select>
      </div>

      <div class="col-md-4">
        <select id="opiniao" class="form-select">
          <option value="">Opinião</option>
          <option value="4">Ótimo</option>
          <option value="3">Bom</option>
          <option value="2">Regular</option>
          <option value="1">Péssimo</option>
        </select>
      </div>
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-custom px-4" onclick="adicionar()">Adicionar</button>
    </div>

    <div class="text-center mt-3">
      <button class="btn btn-warning px-4" onclick="gerarPessoasAleatorias()">
        Gerar 45 Pessoas Aleatórias
      </button>
    </div>

    <hr class="my-4">

    <div class="text-center">
      <button class="btn btn-success px-4" onclick="calcular()">Calcular Resultados</button>
    </div>

    <div id="mensagem" class="mt-3"></div>
    <div id="resultado" class="mt-4"></div>
  </div>
</div>

<script>
let pessoas = [];

function limparCampos() {
  document.getElementById("idade").value = "";
  document.getElementById("sexo").value = "";
  document.getElementById("opiniao").value = "";
}

function mostrarMensagem(texto, tipo) {
  document.getElementById("mensagem").innerHTML = `
    <div class="alert alert-${tipo} text-center">${texto}</div>
  `;
}

function adicionar() {
  const idade = Number(document.getElementById("idade").value);
  const sexo = document.getElementById("sexo").value;
  const opiniaoValue = document.getElementById("opiniao").value;

  if (idade <= 0 || sexo === "" || opiniaoValue === "") {
    mostrarMensagem("Preencha todos os campos corretamente!", "danger");
    return;
  }

  const opiniao = Number(opiniaoValue);

  pessoas.push({ idade, sexo, opiniao });

  limparCampos();
  mostrarMensagem("Pessoa adicionada com sucesso!", "success");
}

function gerarPessoasAleatorias(qtd = 45) {
  const sexos = ["M", "F", "O"];

  for (let i = 0; i < qtd; i++) {
    const idade = Math.floor(Math.random() * 60) + 18;
    const sexo = sexos[Math.floor(Math.random() * sexos.length)];
    const opiniao = Math.floor(Math.random() * 4) + 1;

    pessoas.push({ idade, sexo, opiniao });
  }

  mostrarMensagem(qtd + " pessoas geradas automaticamente!", "info");
}

function calcular() {
  if (pessoas.length === 0) {
    mostrarMensagem("Nenhum dado inserido!", "warning");
    return;
  }

  let somaIdade = 0;
  let maior = pessoas[0].idade;
  let menor = pessoas[0].idade;
  let pessimo = 0;
  let otimoBom = 0;
  let homens = 0, mulheres = 0, outros = 0;

  pessoas.forEach(p => {
    somaIdade += p.idade;

    if (p.idade > maior) maior = p.idade;
    if (p.idade < menor) menor = p.idade;

    if (p.opiniao === 1) pessimo++;
    if (p.opiniao === 3 || p.opiniao === 4) otimoBom++;

    if (p.sexo === "M") homens++;
    else if (p.sexo === "F") mulheres++;
    else outros++;
  });

  let media = somaIdade / pessoas.length;
  let porcentagem = (otimoBom / pessoas.length) * 100;

  document.getElementById("resultado").innerHTML = `
    <div class="alert alert-light text-dark rounded-4 shadow">
      <h5>📊 Resultados</h5>
      <p><strong>Total de pessoas:</strong> ${pessoas.length}</p>
      <p><strong>Média de idade:</strong> ${media.toFixed(2)}</p>
      <p><strong>Maior idade:</strong> ${maior}</p>
      <p><strong>Menor idade:</strong> ${menor}</p>
      <p><strong>Quantidade de "Péssimo":</strong> ${pessimo}</p>
      <p><strong>% de "Ótimo" e "Bom":</strong> ${porcentagem.toFixed(2)}%</p>
      <p><strong>Homens:</strong> ${homens}</p>
      <p><strong>Mulheres:</strong> ${mulheres}</p>
      <p><strong>Outros:</strong> ${outros}</p>
    </div>
  `;
}
</script>

</body>
</html>
